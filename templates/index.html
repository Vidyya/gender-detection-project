<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gender Detection System</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #5c6bc0, #8e99f3);
            color: #333;
        }

        .container {
            max-width: 520px;
            margin: 80px auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.15);
        }

        h1 {
            margin: 0 0 18px;
            font-size: 2.5rem;
            text-align: center;
            letter-spacing: 0.03em;
            color: #1a237e;
        }

        p.subtitle {
            text-align: center;
            margin: 0 0 32px;
            color: #444;
            line-height: 1.5;
        }

        form {
            display: grid;
            gap: 18px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #c5cae9;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input[type="text"]:focus {
            border-color: #3949ab;
        }

        button {
            background: #3949ab;
            color: white;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        button:hover {
            background: #303f9f;
            transform: translateY(-1px);
        }

        .result-card {
            background: #eef1ff;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #c5cae9;
            text-align: center;
        }

        .result-card strong {
            display: block;
            margin-bottom: 8px;
            color: #1e237a;
        }

        .result-card span {
            font-size: 1.55rem;
            color: #283593;
        }

        .footer {
            margin-top: 22px;
            text-align: center;
            color: #555;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gender Detection System</h1>
        <p class="subtitle">Enter a name and the system will predict whether it is more likely to belong to a male or female.</p>

        <form method="post">
            <input
                type="text"
                name="name"
                placeholder="Type a first name..."
                value="{{ input_name }}"
                required
            />
            <button type="submit">Predict</button>
        </form>

        {% if prediction %}
            <div class="result-card">
                <strong>Prediction Result</strong>
                <span>{{ prediction }}</span>
            </div>
        {% endif %}

        <div class="footer">
            <p>Built with Flask, scikit-learn, and a simple Naive Bayes model.</p>
        </div>
    </div>
</body>
</html>
